upstream api_proxy {
    server api-proxy:3001;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── DuckDuckGo Lite HTML Search Proxy ────────────────
    # Used by: search_web MCP tool (primary)
    # Dev URL:  /api/search/?q=query
    # Target:   https://lite.duckduckgo.com/lite/?q=query
    location /api/search/ {
        proxy_pass https://lite.duckduckgo.com/lite/;
        proxy_ssl_server_name on;
        proxy_set_header Host lite.duckduckgo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        proxy_set_header Accept "text/html,application/json,*/*";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        # Buffer HTML responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Log errors but allow the app to continue
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_intercept_errors off;
    }

    # ── DuckDuckGo Instant Answer API Proxy ──────────────
    # Used by: search_web MCP tool (fallback when Lite fails)
    # Dev URL:  /api/ddg/?q=query&format=json&no_html=1&skip_disambig=1
    # Target:   https://api.duckduckgo.com/?q=query...
    location /api/ddg/ {
        proxy_pass https://api.duckduckgo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.duckduckgo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        proxy_set_header Accept "application/json";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }

    # ── URL Fetch Proxy ──────────────────────────────────
    # Used by: read_url MCP tool
    # Proxies to the internal api-proxy Node.js service which
    # performs server-side HTTP requests to arbitrary URLs.
    location /api/fetch {
        proxy_pass http://api_proxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow longer timeout for slow external fetches
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 10s;

        # Don't buffer — forward response as it arrives
        proxy_buffering off;

        # Retry on failure (upstream might still be starting)
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }

    # ── SPA Static Files ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Aggressively cache static assets with content hashes
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            log_not_found off;
            access_log off;
        }
    }
}
