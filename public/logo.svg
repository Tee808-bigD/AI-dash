<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" fill="none" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="av-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="50%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="av-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="av-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#a29bfe" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow orb -->
  <circle cx="256" cy="256" r="200" fill="url(#av-glow)" opacity="0.5"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#av-gradient)" stroke-width="1.5" opacity="0.2"/>

  <!-- Main hexagonal/cube platform -->
  <rect x="148" y="98" width="216" height="216" rx="36" fill="url(#av-gradient)" filter="url(#soft-glow)"/>

  <!-- Inner accent border -->
  <rect x="154" y="104" width="204" height="204" rx="32" fill="none" stroke="url(#av-accent)" stroke-width="1.5" opacity="0.4"/>

  <!-- "A" letterform -->
  <path d="M196 304 L230 168 C234 156, 242 148, 256 148 C270 148, 278 156, 282 168 L316 304"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- "A" crossbar -->
  <line x1="208" y1="248" x2="304" y2="248" stroke="white" stroke-width="11" stroke-linecap="round"/>

  <!-- "V" letterform (right stroke flowing from A) -->
  <path d="M282 168 L316 304"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- AI neural node accent dot at A's apex -->
  <circle cx="256" cy="178" r="7" fill="white" opacity="0.9" filter="url(#soft-glow)"/>

  <!-- Orbital decorative dots -->
  <circle cx="256" cy="88" r="4.5" fill="#a29bfe" opacity="0.7"/>
  <circle cx="390" cy="190" r="3.5" fill="#fd79a8" opacity="0.5"/>
  <circle cx="122" cy="190" r="3.5" fill="#a29bfe" opacity="0.5"/>
  <circle cx="256" cy="430" r="4.5" fill="#a29bfe" opacity="0.6"/>

  <!-- Sparkle accent dots -->
  <circle cx="172" cy="112" r="3" fill="#fd79a8" opacity="0.7"/>
  <circle cx="350" cy="370" r="2.5" fill="#a29bfe" opacity="0.6"/>
  <circle cx="368" cy="124" r="2.5" fill="#fd79a8" opacity="0.5"/>
  <circle cx="144" cy="360" r="2" fill="#a29bfe" opacity="0.4"/>

  <!-- Bottom title bar -->
  <rect x="108" y="336" width="296" height="60" rx="18" fill="rgba(15,15,42,0.7)" stroke="rgba(108,92,231,0.2)" stroke-width="1"/>
  <text x="256" y="374" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1.5">
    Agent<tspan fill="url(#av-gradient)">Verse</tspan>
  </text>
</svg>
